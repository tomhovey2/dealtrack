<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DealTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#090f16;--surface:#111c26;--surface2:#172330;--border:rgba(180,150,80,0.15);--border2:rgba(180,150,80,0.08);--gold:#c8a84b;--gold-dim:rgba(200,168,75,0.12);--text:#ddeaf5;--text2:#8aa4b8;--text3:#4a6275;--green:#34d399;--green-dim:rgba(52,211,153,0.12);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--purple:#a78bfa;--nav-h:64px;--hdr-h:56px;--safe:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);font-size:13px}
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:100}
#hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);flex-shrink:0}
#hdr-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
#hdr-search input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:100%}
#hdr-search input::placeholder{color:var(--text3)}
#hdr-add{width:34px;height:34px;background:var(--gold);border:none;border-radius:8px;color:var(--bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#main{position:fixed;top:var(--hdr-h);bottom:calc(var(--nav-h) + var(--safe));left:0;right:0;overflow:hidden}
.panel{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel.on{display:block}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe));padding-bottom:var(--safe);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:6px 2px;position:relative;-webkit-user-select:none}
.ntab.on .nicon{color:var(--gold)}
.ntab.on .nlbl{color:var(--gold)}
.ntab.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
.nicon{font-size:16px;color:var(--text3);position:relative}
.nbadge{position:absolute;top:-4px;right:-8px;background:var(--gold);color:var(--bg);font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}
.nlbl{font-size:8px;letter-spacing:0.5px;color:var(--text3);text-transform:uppercase}
.sbar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.scell{background:var(--surface);padding:12px 10px;text-align:center}
.sval{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px;line-height:1}
.slbl{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:3px}
.frow{display:flex;gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border2);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.drow{display:flex;align-items:center;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border2);gap:12px;cursor:pointer}
.drow:active{background:var(--surface2)}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dmain{flex:1;min-width:0}
.dname{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.dsub{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
.dright{text-align:right;flex-shrink:0}
.dprice{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:0.5px;line-height:1}
.dpsub{font-size:9px;color:var(--text3);margin-top:2px}
.dchev{color:var(--text3);font-size:12px;flex-shrink:0}
.tag{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:500;flex-shrink:0}
.tg{background:var(--green-dim);color:var(--green)}
.ta{background:var(--amber-dim);color:var(--amber)}
.tr{background:var(--red-dim);color:var(--red)}
.tb{background:var(--blue-dim);color:var(--blue)}
.to{background:var(--gold-dim);color:var(--gold)}
.tp{background:rgba(167,139,250,0.12);color:var(--purple)}
.tm{background:rgba(138,164,184,0.1);color:var(--text2)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:0.4}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text2);letter-spacing:2px;margin-bottom:6px}
.empty-sub{font-size:11px;color:var(--text3);line-height:1.5}
.more-btn{display:block;width:calc(100% - 28px);margin:10px 14px 16px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;text-align:center;cursor:pointer}
.backdrop{position:fixed;inset:0;background:rgba(9,15,22,0.75);z-index:200;display:none}
.backdrop.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:92vh;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column}
.sheet.on{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-hdr{padding:12px 20px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.sheet-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--text);line-height:1.2;flex:1;padding-right:12px}
.sheet-close{background:var(--surface2);border:none;color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px;flex:1}
.ssec{padding:16px 20px 0}
.ssec-lbl{font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border2)}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.kv-l{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.kv-v{font-size:13px;color:var(--text)}
.hlrow{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border2);margin:14px 20px 0;border-radius:10px;overflow:hidden}
.hlcell{background:var(--surface2);padding:12px 10px;text-align:center}
.hlval{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:0.5px}
.hllbl{font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.asheet{position:fixed;left:0;right:0;bottom:0;max-height:96vh;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);z-index:300;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column}
.asheet.on{transform:translateY(0)}
.asheet-hdr{padding:10px 20px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.asheet-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold)}
.asheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--text3)}
.fs{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none}
.asheet-foot{padding:12px 20px;padding-bottom:calc(12px + var(--safe));border-top:1px solid var(--border2);flex-shrink:0;display:flex;gap:10px}
.btn-save{flex:1;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.btn-cancel{background:var(--surface2);color:var(--text2);border:none;border-radius:10px;padding:14px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
.ihero{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px}
.ihero-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:2px}
.ihero-sub{font-size:10px;color:var(--text3)}
.ikpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.ikpi{background:var(--surface);padding:12px 10px;text-align:center}
.ikpi-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.ikpi-lbl{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:3px}
.isec{padding:14px 14px 0}
.isec-hdr{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.isec-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;font-weight:400;text-transform:none}
.icard{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;margin-bottom:8px}
.icard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.icard-name{font-size:12px;color:var(--text);font-weight:500;line-height:1.3;flex:1}
.icard-name-sub{font-size:10px;font-weight:400;color:var(--text2)}
.icard-sf{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);flex-shrink:0}
.icard-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.icard-note{margin-top:6px;font-size:10px;color:var(--text3);line-height:1.4}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9px;white-space:nowrap}
.pill-mkt{background:var(--blue-dim);color:var(--blue)}
.pill-dev{background:rgba(138,164,184,0.1);color:var(--text2)}
.pill-del{background:var(--amber-dim);color:var(--amber)}
.pill-leased{background:var(--green-dim);color:var(--green)}
.pill-vacant{background:var(--red-dim);color:var(--red)}
.pill-partial{background:var(--gold-dim);color:var(--gold)}
.pill-tenant{background:rgba(167,139,250,0.12);color:var(--purple)}
.smrow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2);gap:10px}
.smrow:last-child{border-bottom:none}
.smname{font-size:12px;color:var(--text);flex:1}
.smname-sub{font-size:9px;color:var(--text3)}
.smrent{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);width:56px;text-align:right}
.vacwrap{width:60px}
.vactrack{height:4px;background:rgba(255,255,255,0.05);border-radius:2px}
.vacfill{height:100%;border-radius:2px}
.vacpct{font-size:9px;text-align:right;margin-top:2px}
.itable{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:0 12px;margin-bottom:14px}
.itable-hdr{display:flex;gap:6px;padding:8px 0 4px;border-bottom:1px solid var(--border2)}
.itable-hdr-cell{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.dmd-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}
.dmd-row:last-child{border-bottom:none}
.dmd-name{font-size:11px;color:var(--text)}
.dmd-sf{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
.ipad{height:24px}
.grp-hdr{padding:10px 14px 6px;font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;font-weight:600;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border2)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-logo">DT</div>
  <div id="hdr-search">
    <span style="color:var(--text3);font-size:15px">&#8981;</span>
    <input type="text" id="search-input" placeholder="Search deals, tenants, addresses..." oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button id="hdr-add" onclick="openAdd()">+</button>
</div>

<div id="main">
  <div class="panel on" id="panel-market">
    <div class="sbar" id="market-stats"></div>
    <div class="frow" id="market-filters"></div>
    <div id="market-list"></div>
  </div>
  <div class="panel" id="panel-offmarket">
    <div class="sbar" id="off-stats"></div>
    <div class="frow" id="off-filters"></div>
    <div id="off-list"></div>
  </div>
  <div class="panel" id="panel-sold">
    <div class="sbar" id="sold-stats"></div>
    <div class="frow" id="sold-filters"></div>
    <div id="sold-list"></div>
  </div>
  <div class="panel" id="panel-lease">
    <div class="sbar" id="lease-stats"></div>
    <div class="frow" id="lease-filters"></div>
    <div id="lease-list"></div>
  </div>
  <div class="panel" id="panel-comp">
    <div class="sbar" id="comp-stats"></div>
    <div class="frow" id="comp-filters"></div>
    <div id="comp-list"></div>
  </div>
  <div class="panel" id="panel-intel">
    <div id="intel-content"></div>
  </div>
</div>

<nav id="nav">
  <div class="ntab on" id="nav-market" onclick="go('market')">
    <div class="nicon">&#9685;<span class="nbadge" id="b-market"></span></div>
    <div class="nlbl">JLL</div>
  </div>
  <div class="ntab" id="nav-offmarket" onclick="go('offmarket')">
    <div class="nicon">&#9671;<span class="nbadge" id="b-offmarket"></span></div>
    <div class="nlbl">Pipeline</div>
  </div>
  <div class="ntab" id="nav-sold" onclick="go('sold')">
    <div class="nicon">&#10003;<span class="nbadge" id="b-sold"></span></div>
    <div class="nlbl">Sold</div>
  </div>
  <div class="ntab" id="nav-lease" onclick="go('lease')">
    <div class="nicon">&#8801;<span class="nbadge" id="b-lease"></span></div>
    <div class="nlbl">Lease</div>
  </div>
  <div class="ntab" id="nav-comp" onclick="go('comp')">
    <div class="nicon">&#8853;<span class="nbadge" id="b-comp"></span></div>
    <div class="nlbl">Comp</div>
  </div>
  <div class="ntab" id="nav-intel" onclick="go('intel')">
    <div class="nicon">&#128202;</div>
    <div class="nlbl">Intel</div>
  </div>
</nav>

<div class="backdrop" id="bd1" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="sheet-title"></div>
    <button class="sheet-close" onclick="closeSheet()">&#10005;</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="backdrop" id="bd2" onclick="closeAdd()"></div>
<div class="asheet" id="asheet">
  <div class="sheet-handle"></div>
  <div class="asheet-hdr">
    <div class="asheet-title">ADD ENTRY</div>
    <select class="fs" id="add-type" style="width:auto;font-size:10px;padding:6px 10px" onchange="renderAddForm()">
      <option value="market">JLL Deal</option>
      <option value="lease">Lease Comp</option>
      <option value="sold">Sale Comp</option>
      <option value="comp">Competitor</option>
      <option value="offmarket">Pipeline</option>
    </select>
  </div>
  <div class="asheet-body" id="add-form"></div>
  <div class="asheet-foot">
    <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
    <button class="btn-save" onclick="saveEntry()">Save</button>
  </div>
</div>

function H(id){ return document.getElementById(id); }
function setH(id,h){ H(id).innerHTML=h; }
function fmt(v){ if(!v) return '--'; var n=parseInt(String(v).replace(/[^0-9]/g,'')); return isNaN(n)?v:n.toLocaleString(); }
function mid(c){ return '<span style="color:var(--text3)"> &middot; </span>'+c; }
function empty(icon,t,s){ return '<div class="empty"><div class="empty-icon">'+icon+'</div><div class="empty-title">'+t+'</div><div class="empty-sub">'+s+'</div></div>'; }
function moreBtn(tab,n){ return '<button class="more-btn" onclick="more(''+tab+'')">Show more ('+n+' remaining)</button>'; }
function more(tab){ APP.shown[tab]=(APP.shown[tab]||APP.PAGE)+APP.PAGE; render(tab); }
function qs(r){ return APP.search?JSON.stringify(r).toLowerCase().indexOf(APP.search)!==-1:true; }
function sbar(id,cells){ setH(id,cells.map(function(c){ return '<div class="scell"><div class="sval">'+c[0]+'</div><div class="slbl">'+c[1]+'</div></div>'; }).join('')); }
function chips(id,arr){ setH(id,arr.map(function(c){ return c.div?'<div style="width:1px;background:var(--border);flex-shrink:0"></div>':'<div class="chip'+(c.on?' on':'')+'" onclick="'+c.fn+'">'+c.label+'</div>'; }).join('')); }

function go(tab){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.ntab').forEach(function(n){n.classList.remove('on');});
  H('panel-'+tab).classList.add('on');
  H('nav-'+tab).classList.add('on');
  APP.tab=tab;
  closeSheet();
  if(tab==='intel'){renderIntel();return;}
  render(tab);
}

function onSearch(){
  APP.search=H('search-input').value.toLowerCase();
  APP.shown[APP.tab]=APP.PAGE;
  render(APP.tab);
}

function render(tab){
  if(!APP.shown[tab]) APP.shown[tab]=APP.PAGE;
  if(tab==='market') renderMarket();
  else if(tab==='sold') renderSold();
  else if(tab==='lease') renderLease();
  else if(tab==='comp') renderComp();
  else if(tab==='offmarket') renderPipeline();
}

function renderMarket(){
  var f=APP.filters.market;
  var closed=JLL_CLOSED||[];
  var isC=f.kind==='Closed';
  var data=isC?closed:APP.market.filter(qs);
  if(!isC){
    var aw=data.filter(function(r){return r.status==='Awarded';}).length;
    sbar('market-stats',[[data.length,'Total'],[aw,'Awarded'],[data.length-aw,'Active']]);
  } else {
    sbar('market-stats',[[data.length,'Closed'],['',''],['','']]);
  }
  chips('market-filters',[
    {label:'In Market',on:!isC,fn:"setF('market','kind','')"},
    {label:'Closed',on:isC,fn:"setF('market','kind','Closed')"}
  ]);
  if(!data.length){setH('market-list',empty('&#9685;',isC?'No Closed Deals':'No JLL Deals','Add entries to get started'));return;}
  var shown=APP.shown.market||APP.PAGE;
  var h='';
  var slice=isC?data:data.slice(0,shown);
  slice.forEach(function(r){
    var idx=isC?closed.indexOf(r):APP.market.indexOf(r);
    var fn=isC?'showDetail('closed','+idx+')':'showDetail('market','+idx+')';
    var dot=isC?'var(--green)':(SDOT[r.status]||'var(--gold)');
    var tc=isC?'tg':(STAG[r.status]||'to');
    h+='<div class="drow" onclick="'+fn+'">';
    h+='<div class="ddot" style="background:'+dot+'"></div>';
    h+='<div class="dmain">';
    h+='<div class="dname">'+(r.property||'--')+'</div>';
    if(r.buyer) h+='<div style="font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px">&#8594; '+r.buyer+'</div>';
    if(r.seller) h+='<div style="font-size:10px;color:var(--text2);margin-bottom:2px">Seller: '+r.seller+'</div>';
    if(isC){
      h+='<div class="dsub"><span>'+fmt(r.sf)+' SF</span>';
      if(r.closeDate){var dp=r.closeDate.split('-');if(dp.length>=2){var mo=parseInt(dp[1],10);var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];h+=mid(ms[mo-1]+' '+dp[0]);}}
      h+='</div>';
    } else {
      h+='<div class="dsub"><span>'+fmt(r.sf)+' SF</span>'+(r.capRate?mid(r.capRate+' cap'):'')+'</div>';
      h+='<div class="dsub" style="margin-top:2px"><span class="tag '+tc+'">'+(r.status||'JLL')+'</span>'+(r.walt?mid(r.walt+'yr WALT'):'')+(r.occupancy?mid(r.occupancy+' occ'):'')+'</div>';
    }
    h+='</div>';
    h+='<div class="dright">';
    if(r.salePrice) h+='<div class="dprice" style="font-size:15px">'+r.salePrice+'</div>';
    if(r.psf) h+='<div class="dpsub">'+r.psf+' PSF</div>';
    if(isC&&r.capRate) h+='<div class="dpsub">'+r.capRate+' cap</div>';
    h+='</div><div class="dchev">&#8250;</div></div>';
  });
  if(!isC&&data.length>shown) h+=moreBtn('market',data.length-shown);
  setH('market-list',h);
  H('b-market').textContent=APP.market.length||'';
}

function renderSold(){
  var f=APP.filters.sold;
  var data=APP.sold.filter(function(r){
    if(f.state&&r.state!==f.state) return false;
    return qs(r);
  });
  data.sort(function(a,b){try{return new Date(b.closeDate)-new Date(a.closeDate);}catch(e){return 0;}});
  var caps=data.map(function(r){return parseFloat(r.capRate)||0;}).filter(function(v){return v>0;});
  var avgCap=caps.length?(caps.reduce(function(a,b){return a+b;},0)/caps.length).toFixed(2)+'%':'--';
  var psfs=data.map(function(r){return parseFloat(String(r.psf||'').replace(/[^0-9.]/g,''))||0;}).filter(function(v){return v>0;});
  var avgPsf=psfs.length?'$'+(psfs.reduce(function(a,b){return a+b;},0)/psfs.length).toFixed(0):'--';
  sbar('sold-stats',[[data.length,'Sales'],[avgCap,'Avg Cap'],[avgPsf,'Avg PSF']]);
  chips('sold-filters',[
    {label:'All',on:!f.state,fn:"setF('sold','state','')"},
    {label:'MA',on:f.state==='MA',fn:"setF('sold','state','MA')"},
    {label:'CT',on:f.state==='CT',fn:"setF('sold','state','CT')"},
    {label:'NH',on:f.state==='NH',fn:"setF('sold','state','NH')"},
    {label:'Other',on:f.state==='Other',fn:"setF('sold','state','Other')"}
  ]);
  if(!data.length){setH('sold-list',empty('&#10003;','No Sales','Add sale comps'));return;}
  var shown=APP.shown.sold||APP.PAGE;
  var h='';
  data.slice(0,shown).forEach(function(r){
    var idx=APP.sold.indexOf(r);
    h+='<div class="drow" onclick="showDetail('sold','+idx+')">';
    h+='<div class="ddot" style="background:var(--green)"></div>';
    h+='<div class="dmain">';
    h+='<div class="dname">'+(r.property||'--')+'</div>';
    if(r.buyer) h+='<div style="font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px">&#8594; '+r.buyer+'</div>';
    if(r.seller) h+='<div style="font-size:10px;color:var(--text2);margin-bottom:2px">Seller: '+r.seller+'</div>';
    h+='<div class="dsub"><span>'+(r.market||'--')+'</span>'+mid(fmt(r.sf)+' SF')+(r.closeDate?mid(r.closeDate):'')+'</div>';
    h+='</div>';
    h+='<div class="dright"><div class="dprice">'+(r.salePrice||'--')+'</div>';
    if(r.psf) h+='<div class="dpsub">'+r.psf+' PSF</div>';
    if(r.capRate) h+='<div class="dpsub">'+r.capRate+' cap</div>';
    h+='</div><div class="dchev">&#8250;</div></div>';
  });
  if(data.length>shown) h+=moreBtn('sold',data.length-shown);
  setH('sold-list',h);
  H('b-sold').textContent=APP.sold.length||'';

function renderPipeline(){
  var f=APP.filters.offmarket||{status:''};
  var all=(PIPELINE_DEALS||[]).filter(qs).concat(APP.pipeline.filter(qs));
  var BOV=['IN PROGRESS','RECENTLY DELIVERED'];
  var ORDER=['UNDER CONTRACT','OFF MARKET','IN THE MARKET','BOV','COMING TO MARKET','TRACKING'];
  var ch=[{label:'All',on:!f.status,fn:"setF('offmarket','status','')"}];
  [['UNDER CONTRACT','UC'],['OFF MARKET','Off Mkt'],['IN THE MARKET','In Mkt'],['COMING TO MARKET','Coming'],['TRACKING','Tracking']].forEach(function(pair){
    var cnt=all.filter(function(r){return r.status===pair[0];}).length;
    if(cnt) ch.push({label:pair[1],on:f.status===pair[0],fn:"setF('offmarket','status','"+pair[0]+"')"});
  });
  var bovCnt=all.filter(function(r){return BOV.indexOf(r.status)!==-1;}).length;
  if(bovCnt) ch.push({label:'BOV',on:f.status==='BOV',fn:"setF('offmarket','status','BOV')"});
  chips('off-filters',ch);
  var data;
  if(f.status==='BOV') data=all.filter(function(r){return BOV.indexOf(r.status)!==-1;});
  else if(f.status) data=all.filter(function(r){return r.status===f.status;});
  else data=all;
  var uc=all.filter(function(r){return r.status==='UNDER CONTRACT';}).length;
  var active=all.filter(function(r){return ['IN THE MARKET','COMING TO MARKET','IN PROGRESS','OFF MARKET'].indexOf(r.status)!==-1;}).length;
  sbar('off-stats',[[all.length,'Total'],[uc,'Under Contract'],[active,'Active']]);
  if(!data.length){setH('off-list',empty('&#9671;','No Pipeline Deals',''));return;}
  var PDOT={'UNDER CONTRACT':'var(--green)','IN THE MARKET':'var(--gold)','OFF MARKET':'var(--purple)','COMING TO MARKET':'var(--blue)','IN PROGRESS':'var(--amber)','RECENTLY DELIVERED':'var(--text2)','TRACKING':'var(--text3)'};
  var PTC={'UNDER CONTRACT':'tg','IN THE MARKET':'to','OFF MARKET':'tp','COMING TO MARKET':'tb','IN PROGRESS':'ta','RECENTLY DELIVERED':'tm','TRACKING':'tm'};
  var h='';
  if(f.status){
    data.forEach(function(r){h+=prow(r,all.indexOf(r),PDOT,PTC);});
  } else {
    var groups={};
    all.forEach(function(r){var s=r.status||'OTHER';if(!groups[s])groups[s]=[];groups[s].push(r);});
    ORDER.forEach(function(s){
      var rows=s==='BOV'?all.filter(function(r){return BOV.indexOf(r.status)!==-1;}):(groups[s]||[]);
      if(!rows.length) return;
      h+='<div class="grp-hdr">'+s+' <span style="color:var(--gold);font-family:Bebas Neue,sans-serif;font-size:16px;vertical-align:middle">'+rows.length+'</span></div>';
      rows.forEach(function(r){h+=prow(r,all.indexOf(r),PDOT,PTC);});
    });
  }
  setH('off-list',h);
  H('b-offmarket').textContent=all.length||'';
}

function prow(r,idx,PDOT,PTC){
  var dot=PDOT[r.status]||'var(--text3)';
  var tc=PTC[r.status]||'tm';
  var h='<div class="drow" onclick="showPipeline('+idx+')">';
  h+='<div class="ddot" style="background:'+dot+'"></div>';
  h+='<div class="dmain">';
  h+='<div class="dname">'+(r.property||'--')+'</div>';
  if(r.buyer) h+='<div style="font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px">&#8594; '+r.buyer+'</div>';
  if(r.seller) h+='<div style="font-size:10px;color:var(--text2);margin-bottom:2px">Seller: '+r.seller+'</div>';
  h+='<div class="dsub"><span>'+fmt(r.sf)+' SF</span>'+(r.capRate?mid(r.capRate+' cap'):'')+'</div>';
  h+='<div class="dsub" style="margin-top:2px"><span class="tag '+tc+'">'+(r.status||'--')+'</span>'+(r.lead?mid('<span style="color:var(--text2)">'+r.lead+'</span>'):'')+'</div>';
  h+='</div>';
  h+='<div class="dright">';
  if(r.salePrice) h+='<div class="dprice" style="font-size:15px">'+r.salePrice+'</div>';
  if(r.psf) h+='<div class="dpsub">'+r.psf+' PSF</div>';
  h+='</div><div class="dchev">&#8250;</div></div>';
  return h;
}

function showDetail(sec,idx){
  var map={market:APP.market,sold:APP.sold,comp:APP.comp,closed:JLL_CLOSED};
  var r=map[sec][idx];
  if(!r) return;
  H('sheet-title').textContent=r.property||r.tenants||'--';
  var fields={
    market:[['Asking Price','salePrice',1],['PSF','psf',1],['Cap Rate','capRate'],['WALT','walt'],['Occupancy','occupancy'],['Status','status'],['SF','sf'],['Market','market'],['Clear Ht','clearHeight'],['Yr Built','yearBuilt'],['Bldg Class','buildingClass'],['Buyer','buyer'],['Seller','seller'],['Tenants','tenants'],['Notes','notes']],
    sold:[['Sale Price','salePrice',1],['PSF','psf',1],['Cap Rate','capRate'],['WALT','walt'],['Occupancy','occupancy'],['Close Date','closeDate'],['SF','sf'],['Market','market'],['Clear Ht','clearHeight'],['Yr Built','yearBuilt'],['Bldg Class','buildingClass'],['Buyer','buyer'],['Seller','seller'],['Tenants','tenants'],['Notes','notes']],
    comp:[['Price','salePrice',1],['PSF','psf',1],['Cap Rate','capRate'],['Status','status'],['SF','sf'],['Market','market'],['Buyer','buyer'],['Broker','broker'],['Seller','seller'],['Notes','notes']],
    closed:[['Sale Price','salePrice',1],['PSF','psf',1],['Cap Rate','capRate'],['SF','sf'],['Market','market'],['Close Date','closeDate'],['Buyer','buyer'],['Seller','seller'],['Lead','lead']]
  };
  var flds=fields[sec]||[];
  var big=flds.filter(function(f){return f[2];});
  var rest=flds.filter(function(f){return !f[2];});
  var h='';
  if(big.length){
    h+='<div class="hlrow">';
    big.forEach(function(f){h+='<div class="hlcell"><div class="hlval">'+(r[f[1]]||'--')+'</div><div class="hllbl">'+f[0]+'</div></div>';});
    h+='</div>';
  }
  var stTags={BOM:'tg','Under Contract':'ta',Marketed:'tb','Best & Final':'tr',LOI:'to',Awarded:'tg',Marketing:'tb'};
  h+='<div class="ssec" style="margin-top:16px"><div class="ssec-lbl">Details</div><div class="kv">';
  rest.forEach(function(f){
    var val=r[f[1]]||'--';
    if(f[1]==='status'&&val!=='--') val='<span class="tag '+(stTags[val]||'to')+'">'+val+'</span>';
    if(f[1]==='sf'&&val!=='--') val=fmt(val)+' SF';
    var full=f[1]==='notes'||f[1]==='tenants';
    h+='<div'+(full?' style="grid-column:1/-1"':'')+'><div class="kv-l">'+f[0]+'</div><div class="kv-v">'+val+'</div></div>';
  });
  h+='</div></div>';
  setH('sheet-body',h);
  openSheet();
}

function sortByDate(arr,field){ return arr.slice().sort(function(a,b){try{return new Date(b[field])-new Date(a[field]);}catch(e){return 0;}}); }

function init(){
try { var d=sessionStorage.getItem(‘dt’); if(d){var p=JSON.parse(d);[‘market’,‘sold’,‘comp’,‘compSold’,‘pipeline’].forEach(function(k){if(p[k]&&p[k].length)APP[k]=p[k];});} } catch(e){}
function merge(base,stored,key){var bk={};base.forEach(function(r){bk[r[key||‘property’]]=1;});return base.concat(stored.filter(function(r){return !bk[r[key||‘property’]];}));}
APP.lease = sortByDate(IMPORTED_LEASE_COMPS||[],‘closeDate’);
APP.sold = sortByDate(merge(SALE_COMPS||[],APP.sold,‘property’),‘closeDate’);
APP.market = merge(JLL_IN_MARKET||[],APP.market,‘property’);
APP.comp = merge(COMP_IN_MARKET||[],APP.comp,‘property’);
render(‘market’);
H(‘b-sold’).textContent=APP.sold.length||’’;
H(‘b-lease’).textContent=APP.lease.length>99?‘99+’:APP.lease.length;
H(‘b-comp’).textContent=(APP.comp.length+APP.compSold.length)||’’;
H(‘b-offmarket’).textContent=(PIPELINE_DEALS||[]).length||’’;
}
