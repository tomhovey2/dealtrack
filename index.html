<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1c2030;
    --border: #252a3a;
    --accent: #e8c84a;
    --accent2: #4a9ee8;
    --accent3: #e84a6f;
    --text: #f0f2f8;
    --muted: #7a8299;
    --soft: #3a4260;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Text’, ‘Segoe UI’, sans-serif;
font-size: 14px;
min-height: 100vh;
padding-bottom: 40px;
}

/* HEADER */
.header {
background: linear-gradient(135deg, #0d0f14 0%, #151c2e 100%);
border-bottom: 1px solid var(–border);
padding: 20px 16px 16px;
position: sticky;
top: 0;
z-index: 100;
backdrop-filter: blur(12px);
}
.header-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 14px;
}
.header-title {
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, ‘Segoe UI’, sans-serif;
font-size: 22px;
font-weight: 800;
letter-spacing: -0.5px;
line-height: 1.1;
}
.header-title span { color: var(–accent); }
.header-sub {
font-size: 11px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
letter-spacing: 0.5px;
margin-top: 3px;
}
.last-updated {
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 10px;
color: var(–muted);
text-align: right;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
padding: 4px 8px;
}

/* STATS STRIP */
.stats-strip {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
padding: 12px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
}
.stat-box {
background: var(–card);
border: 1px solid var(–border);
border-radius: 8px;
padding: 10px 8px;
text-align: center;
}
.stat-val {
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, ‘Segoe UI’, sans-serif;
font-size: 16px;
font-weight: 800;
color: var(–accent);
line-height: 1;
}
.stat-lbl {
font-size: 9px;
color: var(–muted);
margin-top: 3px;
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
letter-spacing: 0.3px;
}

/* FILTERS */
.filters {
padding: 12px 16px;
background: var(–bg);
border-bottom: 1px solid var(–border);
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
background: var(–surface);
border: 1px solid var(–border);
color: var(–muted);
border-radius: 20px;
padding: 6px 14px;
font-size: 12px;
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
flex-shrink: 0;
}
.filter-btn.active {
background: var(–accent);
color: #0d0f14;
border-color: var(–accent);
font-weight: 500;
}

/* SORT BAR */
.sort-bar {
padding: 10px 16px;
display: flex;
align-items: center;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
border-bottom: 1px solid var(–border);
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-lbl {
font-size: 10px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
flex-shrink: 0;
}
.sort-btn {
background: none;
border: 1px solid var(–border);
color: var(–muted);
border-radius: 6px;
padding: 4px 10px;
font-size: 11px;
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
flex-shrink: 0;
}
.sort-btn.active {
border-color: var(–accent2);
color: var(–accent2);
}

/* COUNT */
.result-count {
padding: 8px 16px;
font-size: 11px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
}
.result-count span { color: var(–accent); }

/* CARDS */
.cards {
padding: 0 16px;
display: flex;
flex-direction: column;
gap: 12px;
}

.comp-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
transition: border-color 0.2s;
cursor: pointer;
}
.comp-card:active { border-color: var(–accent); }

.card-header {
padding: 14px 14px 10px;
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 10px;
}
.card-address {
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, ‘Segoe UI’, sans-serif;
font-size: 15px;
font-weight: 700;
line-height: 1.2;

}
.card-price {

font-size: 17px;
font-weight: 800;
color: var(–accent);
white-space: nowrap;
}

.card-location {
display: flex;
align-items: center;
gap: 6px;
padding: 0 14px 10px;
}
.badge {
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 10px;
padding: 2px 7px;
border-radius: 4px;
border: 1px solid;
font-weight: 500;
}
.badge-sub {
color: var(–accent2);
border-color: rgba(74, 158, 232, 0.3);
background: rgba(74, 158, 232, 0.08);
}
.badge-state {
color: var(–muted);
border-color: var(–border);
background: var(–surface);
}
.badge-occ {
border-color: rgba(232, 200, 74, 0.3);
background: rgba(232, 200, 74, 0.08);
color: var(–accent);
}
.badge-vacant {
color: var(–accent3);
border-color: rgba(232, 74, 111, 0.3);
background: rgba(232, 74, 111, 0.08);
}
.badge-user {
color: #a78bfa;
border-color: rgba(167, 139, 250, 0.3);
background: rgba(167, 139, 250, 0.08);
}
.badge-contract {
color: #fb923c;
border-color: rgba(251, 146, 60, 0.3);
background: rgba(251, 146, 60, 0.08);
}

.card-metrics {
display: grid;
grid-template-columns: repeat(4, 1fr);
border-top: 1px solid var(–border);
}
.metric {
padding: 10px 10px;
border-right: 1px solid var(–border);
text-align: center;
}
.metric:last-child { border-right: none; }
.metric-val {
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 12px;
font-weight: 500;
color: var(–text);
line-height: 1;
}
.metric-key {
font-size: 9px;
color: var(–muted);
margin-top: 3px;
letter-spacing: 0.3px;
}

.card-notes {
padding: 10px 14px 12px;
border-top: 1px solid var(–border);
font-size: 12px;
color: var(–muted);
line-height: 1.5;
display: none;
}
.card-notes.open { display: block; }

.card-footer {
padding: 8px 14px;
border-top: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
}
.card-date {
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 10px;
color: var(–muted);
}
.card-broker {
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 10px;
color: var(–muted);
}
.broker-jll {
color: var(–accent);
}
.expand-btn {
background: none;
border: none;
color: var(–muted);
font-size: 18px;
cursor: pointer;
padding: 0 2px;
line-height: 1;
transition: color 0.2s;
}
.expand-btn.open { color: var(–accent); }

/* JLL TAG */
.jll-tag {
display: inline-flex;
align-items: center;
gap: 3px;
font-size: 9px;
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
background: rgba(232, 200, 74, 0.12);
border: 1px solid rgba(232, 200, 74, 0.3);
color: var(–accent);
padding: 2px 6px;
border-radius: 4px;
margin-left: auto;
}

/* NO RESULTS */
.no-results {
text-align: center;
padding: 48px 16px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
font-size: 13px;
}

/* FOOTER */
.footer {
padding: 20px 16px 10px;
text-align: center;
font-size: 10px;
color: var(–soft);
font-family: ‘SF Mono’, ‘Fira Mono’, ‘Consolas’, monospace;
}

/* HIGHLIGHT on JLL deals */
.comp-card.jll-deal {
border-left: 2px solid var(–accent);
}
</style>

</head>

let currentFilter = 'All';
let currentSort = 'date';
let openCards = new Set();

function fmt$(n) {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toLocaleString();
}
function fmtSF(n) {
  return n.toLocaleString() + ' SF';
}
function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + day + ', ' + y;
}
function fmtAcre(n) {
  return n.toFixed(2) + ' ac';
}

function getFiltered() {
  let data = [...raw];
  if (currentFilter === 'JLL') data = data.filter(d => d.jll);
  else if (currentFilter !== 'All') data = data.filter(d => d.submarket === currentFilter);
  return data;
}

function getSorted(data) {
  return data.sort((a, b) => {
    if (currentSort === 'date') {
      const da = a.date || '2026-12-31';
      const db = b.date || '2026-12-31';
      return db.localeCompare(da);
    }
    if (currentSort === 'price') return b.price - a.price;
    if (currentSort === 'psf') return b.psf - a.psf;
    if (currentSort === 'acre') return b.perAcre - a.perAcre;
    if (currentSort === 'sf') return b.rsf - a.rsf;
    if (currentSort === 'cap') {
      const ca = a.capRate || 0;
      const cb = b.capRate || 0;
      return cb - ca;
    }
  });
}

function renderStats(data) {
  const totalVol = data.reduce((s, d) => s + d.price, 0);
  const avgPSF = Math.round(data.reduce((s, d) => s + d.psf, 0) / data.length);
  const avgAcre = Math.round(data.reduce((s, d) => s + d.perAcre, 0) / data.length);
  const capDeals = data.filter(d => d.capRate);
  const avgCap = capDeals.length ? (capDeals.reduce((s,d) => s + d.capRate, 0) / capDeals.length).toFixed(2) : '—';

  document.getElementById('statsStrip').innerHTML = `
    <div class="stat-box">
      <div class="stat-val">${data.length}</div>
      <div class="stat-lbl">COMPS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${fmt$(totalVol)}</div>
      <div class="stat-lbl">TOTAL VOL</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">$${avgPSF}</div>
      <div class="stat-lbl">AVG $/SF</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${avgCap === '—' ? avgCap : avgCap + '%'}</div>
      <div class="stat-lbl">AVG CAP</div>
    </div>
  `;
}

function renderCards(data) {

  document.getElementById('resultCount').innerHTML = `Showing <span>${data.length}</span> of ${raw.length} comps`;

  if (data.length === 0) {
    container.innerHTML = '<div class="no-results">No comps match this filter.</div>';
    return;
  }

  container.innerHTML = data.map((d, i) => {
    const idx = raw.indexOf(d);
    const isOpen = openCards.has(idx);

    // Status badge
    let statusBadge = '';
    if (d.status === 'Under Contract') statusBadge = `<span class="badge badge-contract">Under Contract</span>`;
    else if (d.isUser) statusBadge = `<span class="badge badge-user">User</span>`;

    // Occupancy badge
    let occBadge = '';
    if (d.occ === 100) occBadge = `<span class="badge badge-occ">100% Leased</span>`;
    else if (d.occ === 0) occBadge = `<span class="badge badge-vacant">Vacant</span>`;
    else if (d.occ === 50) occBadge = `<span class="badge badge-vacant">50% Occ</span>`;

    // Date display
    let dateStr = fmtDate(d.date);
    if (!d.date && d.status === 'Under Contract') dateStr = 'Under Contract';

    // Clear height
    const cht = d.clearHt || '—';
    // Cap rate
    const cap = d.capRate ? d.capRate.toFixed(2) + '%' : '—';
    // WALT
    const walt = d.walt ? d.walt.toFixed(1) + ' yr' : '—';

    const jllTag = d.jll ? `<span class="jll-tag">★ JLL</span>` : '';
    const brokerStr = d.broker ? `<span class="card-broker ${d.broker === 'JLL' ? 'broker-jll' : ''}">${d.broker}</span>` : '';

    return `
    <div class="comp-card ${d.jll ? 'jll-deal' : ''}" id="card-${idx}">
      <div class="card-header">
        <div class="card-address">${d.address}<br><span style="font-size:12px;color:var(--muted);font-family:-apple-system">${d.city}, ${d.state}</span></div>
        <div>
          <div class="card-price">${fmt$(d.price)}</div>
          <div style="font-size:10px;color:var(--muted);text-align:right;font-family:'DM Mono'">${fmtSF(d.rsf)}</div>
        </div>
      </div>

      <div class="card-location">
        <span class="badge badge-sub">${d.submarket}</span>
        ${occBadge}
        ${statusBadge}
        ${jllTag}
      </div>

      <div class="card-metrics">
        <div class="metric">
          <div class="metric-val">$${d.psf}</div>
          <div class="metric-key">$/SF</div>
        </div>
        <div class="metric">
          <div class="metric-val">${fmtAcre(d.acres)}</div>
          <div class="metric-key">ACRES</div>
        </div>
        <div class="metric">
          <div class="metric-val">${cap}</div>
          <div class="metric-key">CAP</div>
        </div>
        <div class="metric">
          <div class="metric-val">${d.yrBuilt}</div>
          <div class="metric-key">BUILT</div>
        </div>
      </div>

      <div class="card-notes ${isOpen ? 'open' : ''}" id="notes-${idx}">
        <div style="margin-bottom:6px"><span style="color:var(--accent);font-family:'DM Mono';font-size:10px">BUYER:</span> ${d.buyer}</div>
        <div style="margin-bottom:6px"><span style="color:var(--accent);font-family:'DM Mono';font-size:10px">SELLER:</span> ${d.seller}</div>
        ${d.walt ? `<div style="margin-bottom:6px"><span style="color:var(--accent);font-family:'DM Mono';font-size:10px">WALT:</span> ${walt}</div>` : ''}
        ${d.clearHt ? `<div style="margin-bottom:6px"><span style="color:var(--accent);font-family:'DM Mono';font-size:10px">CLEAR HT:</span> ${cht}</div>` : ''}
        ${d.perAcre ? `<div style="margin-bottom:6px"><span style="color:var(--accent);font-family:'DM Mono';font-size:10px">$/ACRE:</span> ${fmt$(d.perAcre)}</div>` : ''}
        <div style="color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-size:12px">${d.notes}</div>
      </div>

      <div class="card-footer">
        <span class="card-date">${dateStr}</span>
        ${brokerStr}
        <button class="expand-btn ${isOpen ? 'open' : ''}" onclick="toggleCard(${idx})">${isOpen ? '▲' : '▼'}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(idx) {
  if (openCards.has(idx)) openCards.delete(idx);
  else openCards.add(idx);
  const notes = document.getElementById(`notes-${idx}`);
  const btn = document.querySelector(`#card-${idx} .expand-btn`);
  if (notes) notes.classList.toggle('open', openCards.has(idx));
  if (btn) {
    btn.classList.toggle('open', openCards.has(idx));
    btn.textContent = openCards.has(idx) ? '▲' : '▼';
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === f);
  });
  render();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${s}'`));
  });
  render();
}

function render() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  renderStats(sorted);
  renderCards(sorted);
}

render();
</script>

</body>
</html>
