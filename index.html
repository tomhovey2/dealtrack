<style> :root {--bg:#090f16;--surface:#111c26;--surface2:#172330;--border:rgba(180,150,80,0.15);--border2:rgba(180,150,80,0.08);--gold:#c8a84b;--gold2:#e8cc80;--gold-dim:rgba(200,168,75,0.12);--text:#ddeaf5;--text2:#8aa4b8;--text3:#4a6275;--green:#34d399;--green-dim:rgba(52,211,153,0.12);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--purple:#a78bfa;--nav-h:64px;--header-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px);} *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%;overflow:hidden;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);font-size:13px} .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:100} .header-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);flex-shrink:0} .header-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px} .header-search input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:100%} .header-search input::placeholder{color:var(--text3)} .header-add{width:34px;height:34px;background:var(--gold);border:none;border-radius:8px;color:var(--bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1} .main{position:fixed;top:var(--header-h);bottom:calc(var(--nav-h) + var(--safe-bottom));left:0;right:0;overflow:hidden} .tab-panel{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch} .tab-panel.active{display:block} .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);b one} .sheet-backdrop.open{display:block} .bottom-sheet{position:fixed;left:0;right:0;bottom:0;max-height:92vh;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column} .bottom-sheet.open{transform:translateY(0)} .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0} .sheet-header{padding:12px 20px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0} .sheet-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--text);line-height:1.2;flex:1;padding-right:12px} .sheet-close{background:var(--surface2);border:none;color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0} .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px;flex:1} .sheet-sec{padding:16px 20px 0} .sheet-sec-lbl{font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border2)} .kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px} .kv-label{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:3px} .kv-value{font-size:13px;color:var(--text)} .kv-value.big{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:1px} .hl-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border2);margin:14px 20px 0;border-radius:10px;overflow:hidden} .hl-cell{background:var(--surface2);padding:12px 10px;text-align:center} .hl-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:0.5px} .hl-label{font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-top:2px} .add-sheet{position:fixed;left:0;right:0;bottom:0;max-height:96vh;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);z-index:300;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column} .add-sheet.open{transform:translateY(0)} .add-sheet-header{padding:10px 20px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0} .add-sheet-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold)} .add-sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:12px} .form-group{display:flex;flex-direction:column;gap:5px} .form-label{font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase} .form-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none} .form-input:focus{border-color:var(--gold)} .form-input::placeholder{color:var(--text3)} .form-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none} .add-sheet-footer{padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border2);flex-shrink:0;display:flex;gap:10px} .btn-save{flex:1;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer} .btn-cancel{background:var(--surface2);color:var(--text2);border:none;border-radius:10px;padding:14px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer} .intel-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px} .intel-hero-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:2px} .intel-hero-sub{font-size:10px;color:var(--text3)} .intel-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)} .intel-kpi{background:var(--surface);padding:12px 10px;text-align:center} .intel-kpi-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1} .intel-kpi-lbl{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:3px} .intel-sec{padding:14px 14px 0} .intel-sec-hdr{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between} .intel-sec-hdr-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;font-weight:400;text-transform:none} .intel-card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;margin-bottom:8px} .intel-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px} .intel-card-name{font-size:12px;color:var(--text);font-weight:500;line-height:1.3;flex:1} .intel-card-name-sub{font-size:10px;font-weight:400;color:var(--text2)} .intel-card-sf{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);flex-shrink:0} .intel-card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center} .intel-card-note{margin-top:6px;font-size:10px;color:var(--text3);line-height:1.4} .pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9px;white-space:nowrap} .pill-mkt{background:var(--blue-dim);color:var(--blue)} .pill-dev{background:rgba(138,164,184,0.1);color:var(--text2)} .pill-del{background:var(--amber-dim);color:var(--amber)} .pill-leased{background:var(--green-dim);color:var(--green)} .pill-vacant{background:var(--red-dim);color:var(--red)} .pill-partial{background:var(--gold-dim);color:var(--gold)} .pill-tenant{background:rgba(167,139,250,0.12);color:var(--purple)} .submarket-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2);gap:10px} .submarket-row:last-child{border-bottom:none} .submarket-name{font-size:12px;color:var(--text);flex:1} .submarket-name-sub{font-size:9px;color:var(--text3)} .submarket-rent{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);width:56px;text-align:right} .vac-wrap{width:60px} .vac-track{height:4px;background:rgba(255,255,255,0.05);border-radius:2px} .vac-fill{height:100%;border-radius:2px} .vac-pct{font-size:9px;text-align:right;margin-top:2px} .intel-table{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:0 12px;margin-bottom:14px} .intel-table-hdr{display:flex;gap:6px;padding:8px 0 4px;border-bottom:1px solid var(--border2)} .intel-table-hdr-cell{font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase} .demand-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)} .demand-row:last-child{border-bottom:none} .demand-name{font-size:11px;color:var(--text)} .demand-sf{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)} .intel-bottom-pad{height:24px} ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px} </style>

<body>

<div class="header">
  <div class="header-logo">DT</div>
  <div class="header-search">
    <span style="color:var(--text3);font-size:15px">&#8981;</span>
    <input type="text" id="search-input" placeholder="Search deals, tenants, addresses..." oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="header-add" onclick="openAdd()">+</button>
</div>

<div class="main">
  <div class="tab-panel active" id="panel-market">
    <div class="stats-bar" id="market-stats-bar"></div>
    <div class="filter-row" id="market-filters"></div>
    <div id="market-list"></div>
  </div>
  <div class="tab-panel" id="panel-sold">
    <div class="stats-bar" id="sold-stats-bar"></div>
    <div class="filter-row" id="sold-filters"></div>
    <div id="sold-list"></div>
  </div>
  <div class="tab-panel" id="panel-leasecomps">
    <div class="stats-bar" id="lc-stats-bar"></div>
    <div class="filter-row" id="lc-filters"></div>
    <div id="lc-list"></div>
  </div>
  <div class="tab-panel" id="panel-comp">
    <div class="stats-bar" id="comp-stats-bar"></div>
    <div class="filter-row" id="comp-filters"></div>
    <div id="comp-list"></div>
  </div>
  <div class="tab-panel" id="panel-offmarket">
    <div class="stats-bar" id="off-stats-bar"></div>
    <div class="filter-row" id="off-filters"></div>
    <div id="off-list"></div>
  </div>
  <div class="tab-panel" id="panel-intel">
    <div id="intel-content"></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-tab active" id="nav-market" onclick="switchTab('market')">
    <div class="nav-icon">&#9685;<span class="nav-badge" id="badge-market"></span></div>
    <div class="nav-label">JLL</div>
  </div>
  <div class="nav-tab" id="nav-offmarket" onclick="switchTab('offmarket')">
    <div class="nav-icon">&#9671;<span class="nav-badge" id="badge-offmarket"></span></div>
    <div class="nav-label">Pipeline</div>
  </div>
  <div class="nav-tab" id="nav-sold" onclick="switchTab('sold')">
    <div class="nav-icon">&#10003;<span class="nav-badge" id="badge-sold"></span></div>
    <div class="nav-label">Sold</div>
  </div>
  <div class="nav-tab" id="nav-leasecomps" onclick="switchTab('leasecomps')">
    <div class="nav-icon">&#8801;<span class="nav-badge" id="badge-leasecomps"></span></div>
    <div class="nav-label">Lease</div>
  </div>
  <div class="nav-tab" id="nav-comp" onclick="switchTab('comp')">
    <div class="nav-icon">&#8853;<span class="nav-badge" id="badge-comp"></span></div>
    <div class="nav-label">Comp</div>
  </div>
  <div class="nav-tab" id="nav-intel" onclick="switchTab('intel')">
    <div class="nav-icon">&#128202;</div>
    <div class="nav-label">Intel</div>
  </div>
</nav>

<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">&#8212;</div>
    <button class="sheet-close" onclick="closeSheet()">&#10005;</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="sheet-backdrop" id="add-backdrop" onclick="closeAdd()"></div>
<div class="add-sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="add-sheet-header">
    <div class="add-sheet-title">ADD ENTRY</div>
    <select class="form-select" id="add-section-sel" style="width:auto;font-size:10px;padding:6px 10px" onchange="renderAddForm()">
      <option value="market">JLL Deal</option>
      <option value="leasecomps">Lease Comp</option>
      <option value="sold">Sale Comp</option>
      <option value="comp">Competitor</option>
      <option value="offmarket">Off Market</option>
    </select>
  </div>
  <div class="add-sheet-body" id="add-form"></div>
  <div class="add-sheet-footer">
    <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
    <button class="btn-save" onclick="saveEntry()">Save</button>
  </div>
</div>

<script>
var S = {
  currentTab: 'market',
  market: [], sold: [], leasecomps: [], compmarket: [], compsold: [], offmarket: [],
  search: '',
  filters: {
    market: { kind: '' },
    sold: { state: '' },
    offmarket: { status: '' },
    leasecomps: { market: '', type: '' },
    comp: { kind: '' }
  },
  shown: {},
  PAGE: 40
};

function setHTML(id, h) { document.getElementById(id).innerHTML = h; }
function fmtSF(v) { if (!v) return '--'; var n = parseInt(String(v).replace(/[^0-9]/g,'')); return isNaN(n) ? v : n.toLocaleString(); }
function emptyState(icon, title, sub) {
  return '<div class="empty-state"><div class="empty-icon">' + icon + '</div><div class="empty-title">' + title + '</div><div class="empty-sub">' + sub + '</div></div>';
}
function lmBtn(tab, rem) {
  return '<button class="load-more-btn" onclick="loadMore(&quot;' + tab + '&quot;)">Show more (' + rem + ' remaining)</button>';
}
function loadMore(tab) { S.shown[tab] = (S.shown[tab] || S.PAGE) + S.PAGE; renderTab(tab); }
function q(r) { return S.search ? JSON.stringify(r).toLowerCase().indexOf(S.search) !== -1 : true; }

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(n) { n.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  S.currentTab = tab;
  closeSheet();
  if (tab === 'intel') { renderIntel(); return; }
  renderTab(tab);
}

function onSearch() {
  S.search = document.getElementById('search-input').value.toLowerCase();
  S.shown[S.currentTab] = S.PAGE;
  renderTab(S.currentTab);
}

function renderTab(tab) {
  try {
    if (!S.shown[tab]) S.shown[tab] = S.PAGE;
    if (tab === 'market') renderJLL();
    else if (tab === 'sold') renderSold();
    else if (tab === 'leasecomps') renderLC();
    else if (tab === 'comp') renderComp();
    else if (tab === 'offmarket') renderOffMkt();
  } catch(e) {
    var listId = tab === 'market' ? 'market-list' : tab === 'sold' ? 'sold-list' : tab === 'leasecomps' ? 'lc-list' : tab === 'comp' ? 'comp-list' : 'off-list';
    document.getElementById(listId).innerHTML = '<div class="empty-state"><div class="empty-title">Error</div><div class="empty-sub">' + e.message + '</div></div>';
  }
}

function filterChips(id, chips) {
  var h = '';
  chips.forEach(function(c) {
    if (c.div) { h += '<div style="width:1px;background:var(--border);flex-shrink:0"></div>'; return; }
    h += '<div class="filter-chip' + (c.active ? ' active' : '') + '" onclick="' + c.fn + '">' + c.label + '</div>';
  });
  setHTML(id, h);
}

var STATUS_DOT = { 'Awarded':'var(--green)', 'Marketing':'var(--blue)', 'BOM':'var(--green)', 'Under Contract':'var(--amber)', 'Marketed':'var(--blue)', 'Best & Final':'var(--red)', 'LOI':'var(--gold)' };
var STATUS_TAG = { 'Awarded':'tag-green', 'Marketing':'tag-blue', 'BOM':'tag-green', 'Under Contract':'tag-amber', 'Marketed':'tag-blue', 'Best & Final':'tag-red', 'LOI':'tag-gold' };

function renderJLL() {
  var f = S.filters.market || { kind: '' };
  var closed = (typeof JLL_CLOSED !== 'undefined') ? JLL_CLOSED : [];
  var isClosedView = f.kind === 'Closed';
  var data = isClosedView ? closed : S.market.filter(q);
  if (!isClosedView) {
    var awarded = data.filter(function(r){ return r.status==='Awarded'; }).length;
    setHTML('market-stats-bar',
      '<div class="stat-cell"><div class="stat-val">' + data.length + '</div><div class="stat-lbl">Total</div></div>' +
      '<div class="stat-cell"><div class="stat-val">' + awarded + '</div><div class="stat-lbl">Awarded</div></div>' +
      '<div class="stat-cell"><div class="stat-val">' + (data.length-awarded) + '</div><div class="stat-lbl">Active</div></div>'
    );
  } else {
    setHTML('market-stats-bar',
      '<div class="stat-cell"><div class="stat-val">' + data.length + '</div><div class="stat-lbl">Closed</div></div>' +
      '<div class="stat-cell"><div class="stat-val">&nbsp;</div><div class="stat-lbl">&nbsp;</div></div>' +
      '<div class="stat-cell"><div class="stat-val">&nbsp;</div><div class="stat-lbl">&nbsp;</div></div>'
    );
  }
  filterChips('market-filters', [
    { label:'In Market', active:f.kind!=='Closed', fn:"setFilter('market','kind','')" },
    { label:'Closed', active:f.kind==='Closed', fn:"setFilter('market','kind','Closed')" }
  ]);
  if (!data.length) { setHTML('market-list', emptyState('&#9685;', isClosedView?'No Closed Deals':'No JLL Deals','Add entries to get started')); return; }
  var shown = S.shown.market || S.PAGE;
  var h = '';
  var slice = isClosedView ? data : data.slice(0, shown);
  slice.forEach(function(r) {
    var idx = isClosedView ? closed.indexOf(r) : S.market.indexOf(r);
    var clickFn = isClosedView ? 'showPipelineDetail(' + ((typeof PIPELINE_DEALS!=='undefined'?PIPELINE_DEALS:[]).length + idx) + ')' : 'showDetail(&quot;market&quot;,' + idx + ')';
    var dot = isClosedView ? 'var(--green)' : (STATUS_DOT[r.status]||'var(--gold)');
    var tc = isClosedView ? 'tag-green' : (STATUS_TAG[r.status]||'tag-gold');
    h += '<div class="deal-row" onclick="' + clickFn + '">';
    h += '<div class="deal-dot" style="background:' + dot + '"></div>';
    h += '<div class="deal-main">';
    h += '<div class="deal-name">' + (r.property||'--') + '</div>';
    if (r.buyer) h += '<div style="font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px">&#8594; ' + r.buyer + '</div>';
    if (r.seller) h += '<div style="font-size:10px;color:var(--text2);margin-bottom:2px">Seller: ' + r.seller + '</div>';
    if (isClosedView) {
      h += '<div class="deal-sub"><span>' + fmtSF(r.sf) + ' SF</span>';
      if (r.closeDate) {
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var dParts = r.closeDate.split('-');
        var dFmt = r.closeDate;
        if (dParts.length >= 2) { var mo = parseInt(dParts[1],10); dFmt = (months[mo-1]||'') + ' ' + dParts[0]; }
        h += '<span style="color:var(--text3)"> &middot; </span><span>' + dFmt + '</span>';
      }
      h += '</div></div>';
      h += '<div class="deal-right">';
      if (r.salePrice) h += '<div class="deal-price" style="font-size:15px">' + r.salePrice + '</div>';
      if (r.psf) h += '<div class="deal-price-sub">' + r.psf + ' PSF</div>';
      if (r.capRate) h += '<div class="deal-price-sub">' + r.capRate + ' cap</div>';
      h += '</div><div class="deal-chevron">&#8250;</div></div>';
    } else {
      h += '<div class="deal-sub"><span>' + fmtSF(r.sf) + ' SF</span>';
      if (r.capRate) h += '<span style="color:var(--text3)"> &middot; </span><span>' + r.capRate + ' cap</span>';

function renderOffMkt() {
  var f = S.filters.offmarket || { status: '' };
  var pipeline = (typeof PIPELINE_DEALS !== 'undefined') ? PIPELINE_DEALS : [];
  var manual = S.offmarket.filter(q);
  var allData = pipeline.filter(q).concat(manual);

  var ORDER = ['UNDER CONTRACT','OFF MARKET','IN THE MARKET','BOV','COMING TO MARKET','TRACKING'];
  var BOV_STATUSES = ['IN PROGRESS','RECENTLY DELIVERED'];

  var chips = [{ label:'All', active:!f.status, fn:"setFilter('offmarket','status','')" }];
  var ucCount = allData.filter(function(r){ return r.status==='UNDER CONTRACT'; }).length;
  if (ucCount) chips.push({ label:'UC', active:f.status==='UNDER CONTRACT', fn:"setFilter('offmarket','status','UNDER CONTRACT')" });
  var omCount = allData.filter(function(r){ return r.status==='OFF MARKET'; }).length;
  if (omCount) chips.push({ label:'Off Mkt', active:f.status==='OFF MARKET', fn:"setFilter('offmarket','status','OFF MARKET')" });
  var imCount = allData.filter(function(r){ return r.status==='IN THE MARKET'; }).length;
  if (imCount) chips.push({ label:'In Mkt', active:f.status==='IN THE MARKET', fn:"setFilter('offmarket','status','IN THE MARKET')" });
  var bovCount = allData.filter(function(r){ return BOV_STATUSES.indexOf(r.status)!==-1; }).length;
  if (bovCount) chips.push({ label:'BOV', active:f.status==='BOV', fn:"setFilter('offmarket','status','BOV')" });
  var ctmCount = allData.filter(function(r){ return r.status==='COMING TO MARKET'; }).length;
  if (ctmCount) chips.push({ label:'Coming', active:f.status==='COMING TO MARKET', fn:"setFilter('offmarket','status','COMING TO MARKET')" });
  var tCount = allData.filter(function(r){ return r.status==='TRACKING'; }).length;
  if (tCount) chips.push({ label:'Tracking', active:f.status==='TRACKING', fn:"setFilter('offmarket','status','TRACKING')" });
  filterChips('off-filters', chips);

  var data;
  if (f.status === 'BOV') {
    data = allData.filter(function(r){ return BOV_STATUSES.indexOf(r.status)!==-1; });
  } else if (f.status) {
    data = allData.filter(function(r){ return r.status===f.status; });
  } else {
    data = allData;
  }

  var uc = allData.filter(function(r){ return r.status==='UNDER CONTRACT'; }).length;
  var active = allData.filter(function(r){ return ['IN THE MARKET','COMING TO MARKET','IN PROGRESS','OFF MARKET'].indexOf(r.status)!==-1; }).length;
  setHTML('off-stats-bar',
    '<div class="stat-cell"><div class="stat-val">' + allData.length + '</div><div class="stat-lbl">Total</div></div>' +
    '<div class="stat-cell"><div class="stat-val">' + uc + '</div><div class="stat-lbl">Under Contract</div></div>' +
    '<div class="stat-cell"><div class="stat-val">' + active + '</div><div class="stat-lbl">Active</div></div>'
  );

  if (!data.length) { setHTML('off-list', emptyState('&#9671;','No Pipeline Deals','')); return; }

  var SDOT = {'UNDER CONTRACT':'var(--green)','IN THE MARKET':'var(--gold)','OFF MARKET':'var(--purple)','COMING TO MARKET':'var(--blue)','IN PROGRESS':'var(--amber)','RECENTLY DELIVERED':'var(--text2)','TRACKING':'var(--text3)'};
  var STC  = {'UNDER CONTRACT':'tag-green','IN THE MARKET':'tag-gold','OFF MARKET':'tag-purple','COMING TO MARKET':'tag-blue','IN PROGRESS':'tag-amber','RECENTLY DELIVERED':'tag-muted','TRACKING':'tag-muted'};

  var h = '';

  if (f.status) {
    data.forEach(function(r) {
      var gidx = allData.indexOf(r);
      var dot = SDOT[r.status]||'var(--text3)';
      var tc = STC[r.status]||'tag-muted';
      h += buildPipelineRow(r, gidx, dot, tc);
    });
  } else {
    var groups = {};
    allData.forEach(function(r) { var s=r.status||'OTHER'; if(!groups[s])groups[s]=[]; groups[s].push(r); });
    ORDER.forEach(function(s) {
      var groupRows;
      if (s === 'BOV') {
        groupRows = allData.filter(function(r){ return BOV_STATUSES.indexOf(r.status)!==-1; });
      } else {
        groupRows = groups[s] || [];
      }
      if (!groupRows.length) return;
      h += '<div style="padding:10px 14px 6px;font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;font-weight:600;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border2)">' + s + ' <span style="color:var(--gold);font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;vertical-align:middle">' + groupRows.length + '</span></div>';
      groupRows.forEach(function(r) {
        var gidx = allData.indexOf(r);
        var dot = SDOT[r.status]||'var(--text3)';
        var tc = STC[r.status]||'tag-muted';
        h += buildPipelineRow(r, gidx, dot, tc);
      });
    });
  }

  setHTML('off-list', h);
  document.getElementById('badge-offmarket').textContent = allData.length || '';
}

  h += '</div>';
  h += '<div class="deal-sub" style="margin-top:2px"><span class="tag ' + tc + '">' + (r.status||'--') + '</span>';
  if (r.lead) h += '<span style="color:var(--text3)"> &middot; </span><span style="color:var(--text2)">' + r.lead + '</span>';
  h += '</div></div>';
  h += '<div class="deal-right">';
  if (r.salePrice) { h += '<div class="deal-price" style="font-size:15px">' + r.salePrice + '</div>'; }
  if (r.psf) h += '<div class="deal-price-sub">' + r.psf + ' PSF</div>';
  h += '</div><div class="deal-chevron">&#8250;</div></div>';
  return h;
}

function sortByDate(arr, field) {
return arr.slice().sort(function(a,b) {
try { return new Date(b[field]) - new Date(a[field]); } catch(e) { return 0; }
});
}

function mergeUnique(base, stored, keyField) {
var baseKeys = {};
base.forEach(function(r) { baseKeys[r[keyField||‘property’]] = true; });
var extras = stored.filter(function(r) { return !baseKeys[r[keyField||‘property’]]; });
return base.concat(extras);
}
